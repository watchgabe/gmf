// ── Better audio comparison — more discriminating ──
function extractFeatures(buf) {
  const d = buf.getChannelData(0), len = d.length, sr = buf.sampleRate;
  // RMS energy
  let ss = 0; for(let i=0;i<len;i++) ss+=d[i]*d[i];
  const rms = Math.sqrt(ss/len);
  // Zero crossing rate
  let zcr = 0; for(let i=1;i<len;i++) if((d[i]>=0)!==(d[i-1]>=0)) zcr++; zcr/=len;
  // Spectral centroid
  const fftSize=4096, frames=Math.floor(len/fftSize); let cS=0;
  for(let f=0;f<frames;f++){let w=0,t=0;for(let k=0;k<fftSize;k++){const m=Math.abs(d[f*fftSize+k]);w+=k*m;t+=m;}cS+=t?w/t:0;}
  const cent = cS/(frames||1);
  // Envelope (10 segments)
  const seg=Math.floor(len/10), env=[];
  for(let s=0;s<10;s++){let e=0;for(let k=0;k<seg;k++)e+=Math.abs(d[s*seg+k]||0);env.push(e/seg);}
  // Peak count (roughness)
  let peaks=0;
  for(let i=1;i<len-1;i++) if(d[i]>d[i-1]&&d[i]>d[i+1]&&Math.abs(d[i])>0.05) peaks++;
  // Low-freq energy (first 300Hz)
  const lowLen=Math.floor(sr*0.05); let lowE=0;
  for(let i=0;i<Math.min(lowLen,len);i++) lowE+=d[i]*d[i];
  lowE=Math.sqrt(lowE/Math.min(lowLen,len));
  return {dur:buf.duration, rms, zcr, cent, env, peaks:peaks/len, lowE};
}

function compareAudio(orig, guess) {
  const a=extractFeatures(orig), b=extractFeatures(guess);
  // Duration — exponential penalty for mismatch
  const durRatio = Math.min(a.dur,b.dur)/Math.max(a.dur,b.dur);
  const durScore = Math.pow(durRatio, 2); // square to penalise more
  // RMS (loudness profile)
  const rmsDiff = Math.abs(a.rms-b.rms)/(Math.max(a.rms,b.rms)||.001);
  const rmsScore = Math.max(0, 1 - rmsDiff*2);
  // ZCR (texture/roughness)
  const zcrDiff = Math.abs(a.zcr-b.zcr)/(Math.max(a.zcr,b.zcr)||.001);
  const zcrScore = Math.max(0, 1 - zcrDiff*3);
  // Spectral centroid (brightness)
  const cenDiff = Math.abs(a.cent-b.cent)/(Math.max(a.cent,b.cent)||.001);
  const cenScore = Math.max(0, 1 - cenDiff*2);
  // Envelope shape
  let envScore=0;
  const aM=Math.max(...a.env)||1, bM=Math.max(...b.env)||1;
  for(let i=0;i<10;i++) envScore+=1-Math.min(1,Math.abs(a.env[i]/aM-b.env[i]/bM)*2);
  envScore/=10;
  // Peak density
  const pkDiff = Math.abs(a.peaks-b.peaks)/(Math.max(a.peaks,b.peaks)||.001);
  const pkScore = Math.max(0, 1-pkDiff*2);
  // Low freq
  const lowDiff = Math.abs(a.lowE-b.lowE)/(Math.max(a.lowE,b.lowE)||.001);
  const lowScore = Math.max(0, 1-lowDiff*2);

  const raw = durScore*.20 + rmsScore*.15 + zcrScore*.20 + cenScore*.15 + envScore*.15 + pkScore*.10 + lowScore*.05;
  // Spread scores more — map 0.3-0.9 range to 0-100 so avg fart gets ~40-60
  const spread = Math.max(0, Math.min(1, (raw - 0.25) / 0.65));
  return Math.round(spread * 100);
}

function drawWaveform(canvas,buffer,color){
  if(!canvas||!buffer)return;
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  const data=buffer.getChannelData(0),step=Math.ceil(data.length/W),amp=H/2;
  ctx.clearRect(0,0,W,H); ctx.strokeStyle=color||C.purple; ctx.lineWidth=1.5; ctx.beginPath();
  for(let i=0;i<W;i++){
    let mn=1,mx=-1;
    for(let j=0;j<step;j++){const v=data[i*step+j]||0;if(v<mn)mn=v;if(v>mx)mx=v;}
    ctx.moveTo(i+.5,amp+mn*amp*.82); ctx.lineTo(i+.5,amp+mx*amp*.82);
  }
  ctx.stroke();
}

function MiniWave({buffer}){
  const ref=useRef(null);

// ── Audio Player Component ──
function AudioPlayer({url, buffer, label="Tap to play"}){
  const [state,setState]=useState('idle'); // idle | loading | playing | paused | error
  const audioRef=useRef(null);

  useEffect(()=>{
    return()=>{ if(audioRef.current){audioRef.current.pause();audioRef.current.src='';} };
  },[url]);

  const toggle=async()=>{
    if(state==='loading')return;
    if(state==='playing'){
      audioRef.current.pause();
      setState('paused');
      return;
    }
    if(state==='paused'&&audioRef.current){
      audioRef.current.play().catch(()=>setState('error'));
      setState('playing');
      return;
    }
    // idle or error — create fresh
    setState('loading');
    try{
      const audio=new Audio();
      audio.crossOrigin='anonymous';
      audioRef.current=audio;
      audio.onended=()=>setState('idle');
      audio.onerror=()=>setState('error');
      audio.oncanplaythrough=()=>{
        audio.play().then(()=>setState('playing')).catch(()=>setState('error'));
      };
      audio.src=url;
      audio.load();
    }catch(e){ setState('error'); }
  };

  const icon = ()=>{
    if(state==='loading') return <Spinner white size={16}/>;
    if(state==='playing') return(
      <svg width="12" height="14" viewBox="0 0 12 14" fill="none"><rect x="1" y="1" width="3.5" height="12" rx="1" fill="white"/><rect x="7.5" y="1" width="3.5" height="12" rx="1" fill="white"/></svg>
    );
    return <svg width="13" height="15" viewBox="0 0 14 16" fill="none"><path d="M2 1.5L13 8L2 14.5V1.5Z" fill="white"/></svg>;
  };

  return(
    <div style={{display:'flex',alignItems:'center',gap:12}}>
      <button onClick={toggle} style={{width:44,height:44,borderRadius:'50%',background:`linear-gradient(135deg,${C.purple},${C.purpleLight})`,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:state==='loading'?'wait':'pointer',flexShrink:0,boxShadow:`0 3px 12px rgba(123,94,167,0.3)`,WebkitTapHighlightColor:'transparent'}}>
        {icon()}
      </button>
      <div style={{fontSize:14,color:C.text3}}>
        {state==='playing'?'Playing…':state==='loading'?'Loading…':state==='error'?'Error loading audio':label}
      </div>
    </div>
  );
}

function useRecorder(){
  const [recording,setRecording]=useState(false);
  const [secs,setSecs]=useState(0);
  const [blob,setBlob]=useState(null);
  const [audioBuffer,setAudioBuffer]=useState(null);
  const mr=useRef(null), chunks=useRef([]), timer=useRef(null);

  const start=useCallback(async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      chunks.current=[];
      const rec=new MediaRecorder(stream); mr.current=rec;
      rec.ondataavailable=e=>{if(e.data.size>0)chunks.current.push(e.data);};
      rec.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const b=new Blob(chunks.current,{type:'audio/webm'});
        setBlob(b);
        try{
          const ab=await b.arrayBuffer();
          const ctx=new(window.AudioContext||window.webkitAudioContext)();
          setAudioBuffer(await ctx.decodeAudioData(ab));
        }catch(e){console.warn(e);}
      };
      rec.start(100); setRecording(true); setSecs(0);
      timer.current=setInterval(()=>setSecs(s=>s+1),1000);
    }catch(e){ alert('Microphone access required. Please allow it in your browser settings and refresh.'); }
  },[]);

  const stop=useCallback(()=>{ clearInterval(timer.current); setRecording(false); if(mr.current&&mr.current.state!=='inactive') mr.current.stop(); },[]);
  const reset=useCallback(()=>{ stop(); setBlob(null); setAudioBuffer(null); setSecs(0); },[stop]);
  const toggle=useCallback(()=>{ recording?stop():start(); },[recording,start,stop]);
  return{recording,secs,blob,audioBuffer,toggle,reset};
}

function RecordScreen({onBack,onSave}){
  const rec=useRecorder();
  const [saving,setSaving]=useState(false);
  const [fartName,setFartName]=useState('');
  const [step,setStep]=useState('record'); // record | name
  const bars=Array.from({length:9});

  const goToName=()=>{ if(rec.audioBuffer&&!rec.recording) setStep('name'); };

  const handleSave=async()=>{
    if(!rec.blob||!rec.audioBuffer||!fartName.trim())return;
    setSaving(true);
    try{
      const filename=`farts/${Date.now()}.webm`;
      const audioUrl=await uploadAudio(rec.blob,filename);
      const {data,error}=await sb.from('farts').insert({
        name:fartName.trim(),

      }).select().single();
      if(error)throw error;
      onSave({id:data.id,name:data.name,date:new Date(data.created_at),duration:data.duration,audioUrl:data.audio_url,audioBuffer:rec.audioBuffer,guessCount:0});
    }catch(e){console.error(e);alert('Failed to save. Check your connection and try again.');}
    setSaving(false);
  };

  // Step 2: name the fart
  if(step==='name'){
    return(
      <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.white}}>
        <NavBar title="Name Your Fart" onBack={()=>setStep('record')}/>
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 24px',gap:16}}>
          <div style={{fontSize:20,fontWeight:700,color:C.text,letterSpacing:'-0.02em',textAlign:'center'}}>Give it a name.</div>
          <div style={{fontSize:14,color:C.text3,textAlign:'center',lineHeight:1.5}}>This is what your friends will see in the list.</div>
          <input
            value={fartName}
            onChange={e=>setFartName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&fartName.trim()&&handleSave()}
            placeholder="e.g. The Classic, Post-Burrito..."
            autoFocus
            style={{width:'100%',padding:'14px 16px',borderRadius:12,border:`1.5px solid ${C.purpleBorder}`,fontSize:16,fontFamily:"'Open Sans',sans-serif",outline:'none',background:C.purpleBg,color:C.text,WebkitAppearance:'none'}}
          />
          <button onClick={handleSave} disabled={!fartName.trim()||saving} style={{width:'100%',padding:15,borderRadius:12,border:'none',background:(!fartName.trim()||saving)?`rgba(123,94,167,0.4)`:`linear-gradient(135deg,${C.purple},${C.purpleLight})`,color:'white',fontFamily:"'Open Sans',sans-serif",fontSize:16,fontWeight:700,cursor:(!fartName.trim()||saving)?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:`0 4px 16px rgba(123,94,167,0.25)`}}>
            {saving&&<Spinner white/>}{saving?'Saving…':'Save & Share'}
          </button>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.white}}>
      <NavBar title="New Fart" onBack={()=>{rec.reset();onBack();}}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 28px'}}>
        {rec.recording&&(
          <div style={{display:'flex',gap:5,height:52,alignItems:'flex-end',marginBottom:32}}>
            {bars.map((_,i)=><div key={i} style={{width:5,background:C.purple,borderRadius:3,opacity:.7,animation:`barPulse 1.2s ease-in-out ${i*.13}s infinite`}}/>)}
          </div>
        )}
        {!rec.recording&&rec.audioBuffer&&(
          <div style={{width:'100%',marginBottom:24}}>
            <BigWave buffer={rec.audioBuffer} height={72}/>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
              <span style={{fontSize:12,color:C.text3}}>0:00</span>
              <span style={{fontSize:12,color:C.text3}}>{fmt(rec.audioBuffer.duration)}</span>
            </div>
          </div>
        )}
        {!rec.recording&&!rec.audioBuffer&&<div style={{height:72,marginBottom:24}}/>}
        <div style={{display:'flex',alignItems:'center',gap:8,background:C.purpleBg,borderRadius:100,padding:'8px 18px',marginBottom:48,border:`1px solid ${C.purpleBorder}`}}>
          {rec.recording&&<div style={{width:7,height:7,borderRadius:'50%',background:C.purple,animation:'blink 1s step-end infinite'}}/>}
          <div style={{fontSize:15,fontWeight:600,color:C.text,fontVariantNumeric:'tabular-nums',letterSpacing:'0.05em'}}>{fmt(rec.secs)}</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 36px',paddingBottom:`calc(40px + env(safe-area-inset-bottom))`}}>
        <button onClick={rec.reset} style={{width:50,height:50,borderRadius:'50%',background:C.purpleBg,border:`1px solid ${C.purpleBorder}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',opacity:(rec.recording||rec.audioBuffer)?1:0,pointerEvents:(rec.recording||rec.audioBuffer)?'auto':'none',WebkitTapHighlightColor:'transparent'}}>
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M1 1L13 13M13 1L1 13" stroke={C.purple} strokeWidth="1.8" strokeLinecap="round"/></svg>
        </button>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
          <RecordButton recording={rec.recording} onToggle={rec.toggle} size="large"/>
          <div style={{fontSize:13,color:C.text3,fontWeight:500}}>{rec.recording?'Tap to stop':rec.audioBuffer?'Tap to re-record':'Tap to record'}</div>
        </div>
        <button onClick={goToName} style={{width:50,height:50,borderRadius:'50%',background:C.purple,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',opacity:(!rec.recording&&rec.audioBuffer)?1:0,pointerEvents:(!rec.recording&&rec.audioBuffer)?'auto':'none',WebkitTapHighlightColor:'transparent',boxShadow:`0 4px 14px rgba(123,94,167,0.35)`}}>
          <svg width="16" height="13" viewBox="0 0 18 14" fill="none"><path d="M1.5 7L6.5 12L16.5 1.5" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
      </div>
    </div>
  );
}

// ════════════ DETAIL SCREEN ════════════
function DetailScreen({sub,onBack,onGuessAdded,isOwner}){
  const [unlocked,setUnlocked]=useState(!!isOwner);
  const [analysing,setAnalysing]=useState(false);
  const [myResult,setMyResult]=useState(null);
  const [guesses,setGuesses]=useState([]);
  const [shareOpen,setShareOpen]=useState(false);
  const [guestName,setGuestName]=useState('');
  const [nameSet,setNameSet]=useState(!!isOwner);
  const [subBuf,setSubBuf]=useState(sub.audioBuffer||null);
  const [loadingAudio,setLoadingAudio]=useState(!sub.audioBuffer);
  const rec=useRecorder();

  useEffect(()=>{
    if(!subBuf&&sub.audioUrl){
      setLoadingAudio(true);
      urlToAudioBuffer(sub.audioUrl).then(b=>{setSubBuf(b);setLoadingAudio(false);}).catch(()=>setLoadingAudio(false));
    }
    sb.from('guesses').select('*').eq('fart_id',sub.id).order('score',{ascending:false})
      .then(({data})=>{ if(data) setGuesses(data.map(g=>({...g,name:g.guesser_name}))); });
    return()=>rec.reset();
  },[sub.id]);

  const analyse=async()=>{
    if(!rec.blob||!rec.audioBuffer||!subBuf)return;
    setAnalysing(true);
    const score=compareAudio(subBuf,rec.audioBuffer);
    let text=`Match score: ${score}%.`;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:180,messages:[{role:'user',content:`Fart acoustics analyst. This person scored ${score}/100 matching a fart. Under 50 is poor, 50-70 is decent, 70-85 is good, 85+ is excellent. Write exactly 1 dry sentence judging their performance. No emoji, no exclamation marks.`}]})});
      const d=await res.json(); text=d.content?.[0]?.text||text;
    }catch(e){}
    try{
      const filename=`guesses/${Date.now()}.webm`;
      const guessUrl=await uploadAudio(rec.blob,filename);
      const {data}=await sb.from('guesses').insert({fart_id:sub.id,guesser_name:guestName||'Guest',score,analysis:text,audio_url:guessUrl}).select().single();
      if(data){
        const ng={...data,name:data.guesser_name};
        const updated=[...guesses,ng].sort((a,b)=>b.score-a.score);
        setGuesses(updated);
        onGuessAdded(sub.id,updated.length);
      }
    }catch(e){console.error(e);}
    setMyResult({score,analysis:text});
    setAnalysing(false);
    setUnlocked(true);
    rec.reset();
  };

  if(!sub)return null;

  // Name entry
  if(!nameSet){
    return(
      <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.white}}>
        <NavBar title={sub.name} onBack={()=>{rec.reset();onBack();}}/>
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px',gap:14}}>
          <div style={{fontSize:20,fontWeight:700,color:C.text,letterSpacing:'-0.02em',textAlign:'center'}}>What's your name?</div>
          <div style={{fontSize:14,color:C.text3,textAlign:'center',lineHeight:1.5}}>It'll show on the leaderboard.</div>
          <input value={guestName} onChange={e=>setGuestName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&guestName.trim()&&setNameSet(true)}
            placeholder="Your name" autoFocus
            style={{width:'100%',padding:'14px 16px',borderRadius:12,border:`1.5px solid ${C.purpleBorder}`,fontSize:16,fontFamily:"'Open Sans',sans-serif",outline:'none',background:C.purpleBg,color:C.text,WebkitAppearance:'none'}}
          />
          <button onClick={()=>guestName.trim()&&setNameSet(true)} style={{width:'100%',padding:14,borderRadius:12,border:'none',background:`linear-gradient(135deg,${C.purple},${C.purpleLight})`,color:'white',fontFamily:"'Open Sans',sans-serif",fontSize:16,fontWeight:700,cursor:'pointer',boxShadow:`0 4px 14px rgba(123,94,167,0.28)`}}>
            Continue
          </button>
        </div>
      </div>
    );
  }

  // Locked
  if(!unlocked)return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.white}}>
      <NavBar title={sub.name} onBack={()=>{rec.reset();onBack();}}/>
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',paddingBottom:20}}>
        <div style={{padding:'20px 16px',borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:12,color:C.text3,marginBottom:14,fontWeight:500}}>{formatDate(sub.date)} · {fmt(sub.duration)}</div>
          <div style={{position:'relative',marginBottom:14,borderRadius:10,overflow:'hidden'}}>
            {loadingAudio
              ?<div style={{height:60,background:C.purpleBg,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}><Spinner/></div>
              :<BigWave buffer={subBuf} height={60} color="rgba(123,94,167,0.15)"/>
            }
            <div style={{position:'absolute',inset:0,backdropFilter:'blur(6px)',WebkitBackdropFilter:'blur(6px)',background:'rgba(243,240,249,0.75)',display:'flex',alignItems:'center',justifyContent:'center',gap:8,borderRadius:10}}>
              <svg width="16" height="20" viewBox="0 0 18 22" fill="none"><rect x="1" y="9" width="16" height="12" rx="3" stroke={C.purple} strokeWidth="1.8"/><path d="M5 9V6a4 4 0 018 0v3" stroke={C.purple} strokeWidth="1.8" strokeLinecap="round"/></svg>
              <span style={{fontSize:13,fontWeight:600,color:C.purple}}>Guess first to unlock</span>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12,opacity:.3,pointerEvents:'none'}}>
            <div style={{width:42,height:42,borderRadius:'50%',background:`linear-gradient(135deg,${C.purple},${C.purpleLight})`,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="13" height="15" viewBox="0 0 14 16" fill="none"><path d="M2 1.5L13 8L2 14.5V1.5Z" fill="white"/></svg>
            </div>
            <div style={{fontSize:14,color:C.text3}}>Locked until you guess</div>
          </div>
        </div>
        <div style={{padding:'20px 16px 32px'}}>
          <div style={{fontSize:20,fontWeight:700,color:C.text,letterSpacing:'-0.02em',marginBottom:4}}>Your Guess</div>
          <div style={{fontSize:13,color:C.text3,marginBottom:20,lineHeight:1.5}}>Record your fart. You'll hear the original after you submit.</div>
          <div style={{background:C.purpleBg,borderRadius:14,padding:'24px 20px',display:'flex',flexDirection:'column',alignItems:'center',gap:14,border:`1px solid ${C.purpleBorder}`}}>
            <div style={{fontSize:13,color:C.text3,textAlign:'center'}}>{rec.audioBuffer?'Tap to re-record.':'Record your fart below.'}</div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
              <RecordButton recording={rec.recording} onToggle={rec.toggle} size="small"/>
              <div style={{fontSize:12,color:C.text3}}>{rec.recording?`Recording · ${fmt(rec.secs)}`:rec.audioBuffer?'Tap to re-record':'Tap to record'}</div>
            </div>
            {rec.audioBuffer&&!rec.recording&&<div style={{width:'100%'}}><BigWave buffer={rec.audioBuffer} height={36} color={C.purpleLight}/></div>}
            {rec.audioBuffer&&!rec.recording&&(
              <button onClick={analyse} disabled={analysing} style={{width:'100%',padding:14,borderRadius:12,border:'none',background:analysing?`rgba(123,94,167,0.5)`:`linear-gradient(135deg,${C.purple},${C.purpleLight})`,color:'white',fontFamily:"'Open Sans',sans-serif",fontSize:15,fontWeight:700,cursor:analysing?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:analysing?'none':`0 4px 14px rgba(123,94,167,0.28)`}}>
                {analysing&&<Spinner white/>}{analysing?'Analysing…':'Submit & Reveal'}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );

  // Unlocked
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.white}}>
      <NavBar title={sub.name} onBack={()=>{rec.reset();onBack();}}
        rightSlot={<button onClick={()=>setShareOpen(true)} style={{background:'none',border:'none',color:C.purple,cursor:'pointer',fontSize:14,fontWeight:600,fontFamily:"'Open Sans',sans-serif",WebkitTapHighlightColor:'transparent'}}>Share</button>}
      />
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',paddingBottom:20}}>
        {myResult&&(
          <div style={{background:`linear-gradient(135deg,${C.purple},${C.purpleLight})`,padding:'20px 16px'}}>
            <div style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.7)',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:4}}>Your Score</div>
            <div style={{fontSize:52,fontWeight:700,color:'white',letterSpacing:'-0.03em',lineHeight:1}}>{myResult.score}<span style={{fontSize:22,fontWeight:500,opacity:.7}}>%</span></div>
            {myResult.analysis&&<div style={{fontSize:13,color:'rgba(255,255,255,0.85)',marginTop:8,lineHeight:1.6}}>{myResult.analysis}</div>}
          </div>
        )}
        <div style={{padding:'20px 16px',borderBottom:`1px solid ${C.border}`}}>
          {myResult&&<div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:12}}>Original — now revealed</div>}
          {!myResult&&<div style={{fontSize:12,color:C.text3,marginBottom:14,fontWeight:500}}>{formatDate(sub.date)} · {fmt(sub.duration)}</div>}
          {loadingAudio
            ?<div style={{height:60,background:C.purpleBg,borderRadius:10,marginBottom:14,display:'flex',alignItems:'center',justifyContent:'center'}}><Spinner/></div>
            :<div style={{marginBottom:14}}><BigWave buffer={subBuf} height={60}/></div>
          }
          <AudioPlayer url={sub.audioUrl} buffer={subBuf}/>
        </div>
        <div style={{padding:'20px 16px 32px'}}>
          <div style={{fontSize:20,fontWeight:700,color:C.text,letterSpacing:'-0.02em',marginBottom:4}}>Leaderboard</div>
          <div style={{fontSize:13,color:C.text3,marginBottom:16}}>{guesses.length} guess{guesses.length!==1?'es':''} so far.</div>
          {guesses.length>0&&(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {guesses.map((g,i)=>(
                <div key={g.id} style={{background:i===0?`linear-gradient(135deg,rgba(123,94,167,0.1),rgba(155,126,200,0.06))`:C.purpleBg,borderRadius:12,padding:'12px 14px',display:'flex',alignItems:'center',gap:10,border:i===0?`1.5px solid ${C.purpleBorder}`:`1px solid ${C.purpleBorder}`}}>
                  <div style={{fontSize:12,fontWeight:700,color:i===0?C.purple:C.text3,width:18,textAlign:'center',flexShrink:0}}>{i+1}</div>
                  {g.audio_url&&(
                    <button onClick={()=>{const a=new Audio(g.audio_url);a.crossOrigin='anonymous';a.play().catch(()=>{});}} style={{width:30,height:30,borderRadius:'50%',background:C.white,border:`1px solid ${C.purpleBorder}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,WebkitTapHighlightColor:'transparent'}}>
                      <svg width="9" height="11" viewBox="0 0 10 12" fill="none"><path d="M1 1L9 6L1 11V1Z" fill={C.purple}/></svg>
                    </button>
                  )}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,color:C.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{g.name||g.guesser_name}</div>
                    {g.analysis&&<div style={{fontSize:11,color:C.text3,marginTop:1,lineHeight:1.4,overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical'}}>{g.analysis}</div>}
                  </div>
                  <div style={{fontSize:17,fontWeight:700,color:i===0?C.purple:C.text,flexShrink:0,marginLeft:4}}>{g.score}%</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
      {shareOpen&&<ShareModal sub={sub} onClose={()=>setShareOpen(false)}/>}
    </div>
  );
}

// ════════════ ROOT ════════════
function App(){
  const [screen,setScreen]=useState('list');
  const [submissions,setSubmissions]=useState([]);
  const [activeSub,setActiveSub]=useState(null);
  const [hist,setHist]=useState(['list']);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    const load=async()=>{
      setLoading(true);
      const {data,error}=await sb.from('farts').select('*').order('created_at',{ascending:false});
      if(error){console.error(error);setLoading(false);return;}
      const subs=await Promise.all((data||[]).map(async f=>{
        const {count}=await sb.from('guesses').select('*',{count:'exact',head:true}).eq('fart_id',f.id);
        return{id:f.id,name:f.name,date:new Date(f.created_at),duration:f.duration,audioUrl:f.audio_url,audioBuffer:null,guessCount:count||0};
      }));
      setSubmissions(subs);
      const params=new URLSearchParams(window.location.search);
      const fartId=params.get('fart');
      if(fartId){
        const target=subs.find(s=>s.id===fartId);
        if(target){setActiveSub(target);setHist(['list','detail']);setScreen('detail');}
      }
      setLoading(false);
    };
    load();
  },[]);

  const navTo=s=>{setHist(h=>[...h,s]);setScreen(s);};
  const pop=()=>setHist(h=>{const n=h.slice(0,-1);setScreen(n[n.length-1]);return n;});
  const slide=s=>({position:'absolute',inset:0,transform:screen===s?'translateX(0)':hist.indexOf(s)<hist.indexOf(screen)?'translateX(-28%)':'translateX(100%)',transition:'transform .34s cubic-bezier(.4,0,.2,1)',zIndex:screen===s?2:1});
  const isOwner=!new URLSearchParams(window.location.search).get('fart');

  return(
    <div style={{height:'100vh',overflow:'hidden',fontFamily:"'Open Sans',sans-serif",position:'relative',background:C.bg}}>
      <div style={slide('list')}>
        <ListScreen submissions={submissions} loading={loading} onOpen={sub=>{setActiveSub(sub);navTo('detail');}} onSubmitNew={()=>navTo('record')}/>
      </div>
      <div style={slide('record')}>
        <RecordScreen onBack={pop} onSave={sub=>{setSubmissions(s=>[sub,...s]);pop();}}/>
      </div>
      <div style={slide('detail')}>
        {activeSub&&<DetailScreen
          sub={submissions.find(s=>s.id===activeSub.id)||activeSub}
          onBack={pop} isOwner={isOwner}
          onGuessAdded={(id,c)=>setSubmissions(p=>p.map(s=>s.id===id?{...s,guessCount:c}:s))}
        />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('shell')).render(<App/>);
</script>
</body>
</html>
