// ── Upload audio blob to Supabase Storage, return public URL ──
async function uploadAudio(blob, filename) {
  const { data, error } = await sb.storage.from(BUCKET).upload(filename, blob, {
    contentType: 'audio/webm', upsert: true,
  });
  if (error) throw error;
  const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(filename);
  return urlData.publicUrl;
}

// ── Fetch audio URL → AudioBuffer ──
async function urlToAudioBuffer(url) {
  const res = await fetch(url);
  const ab = await res.arrayBuffer();
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  return await ctx.decodeAudioData(ab);
}

// ── Waveform ──
function drawWaveform(canvas,buffer,color){
  if(!canvas||!buffer)return;
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  const data=buffer.getChannelData(0),step=Math.ceil(data.length/W),amp=H/2;
  ctx.clearRect(0,0,W,H); ctx.strokeStyle=color||C.purple; ctx.lineWidth=1.5; ctx.beginPath();
  for(let i=0;i<W;i++){
    let mn=1,mx=-1;
    for(let j=0;j<step;j++){const v=data[i*step+j]||0;if(v<mn)mn=v;if(v>mx)mx=v;}
    ctx.moveTo(i+.5,amp+mn*amp*.82); ctx.lineTo(i+.5,amp+mx*amp*.82);
  }
  ctx.stroke();
}
function MiniWave({buffer}){
  const ref=useRef(null);
  useEffect(()=>{if(buffer&&ref.current)drawWaveform(ref.current,buffer,C.purpleLight);},[buffer]);
  return <canvas ref={ref} width={36} height={24} style={{display:'block',width:36,height:24}}/>;
}
function BigWave({buffer,color,height=64}){
  const ref=useRef(null);
  useEffect(()=>{if(buffer&&ref.current)drawWaveform(ref.current,buffer,color||C.purple);},[buffer,color]);
  return <canvas ref={ref} width={600} height={height} style={{width:'100%',height,display:'block',borderRadius:10,background:C.purpleBg}}/>;
}

// ── Audio analysis ──
function extractFeatures(buf){
  const d=buf.getChannelData(0),len=d.length;
  let ss=0; for(let i=0;i<len;i++) ss+=d[i]*d[i];
  const rms=Math.sqrt(ss/len);
  let zcr=0; for(let i=1;i<len;i++) if((d[i]>=0)!==(d[i-1]>=0)) zcr++; zcr/=len;
  const fs=2048,fr=Math.floor(len/fs); let cS=0;
  for(let f=0;f<fr;f++){let w=0,t=0;for(let k=0;k<fs;k++){const m=Math.abs(d[f*fs+k]);w+=k*m;t+=m;}cS+=t?w/t:0;}
  const seg=Math.floor(len/10),env=[];
  for(let s=0;s<10;s++){let e=0;for(let k=0;k<seg;k++)e+=Math.abs(d[s*seg+k]||0);env.push(e/seg);}
  return{dur:buf.duration,rms,zcr,cent:cS/(fr||1),env};
}
function compareAudio(orig,guess){
  const a=extractFeatures(orig),b=extractFeatures(guess);
  const dur=Math.min(a.dur,b.dur)/Math.max(a.dur,b.dur);
  const rms=Math.max(0,1-Math.abs(a.rms-b.rms)/(Math.max(a.rms,b.rms)||.001));
  const zcr=Math.max(0,1-Math.abs(a.zcr-b.zcr)/(Math.max(a.zcr,b.zcr)||.001)*2);
  const cen=Math.max(0,1-Math.abs(a.cent-b.cent)/(Math.max(a.cent,b.cent)||.001));
  let env=0; const aM=Math.max(...a.env)||1,bM=Math.max(...b.env)||1;
  for(let i=0;i<10;i++) env+=1-Math.min(1,Math.abs(a.env[i]/aM-b.env[i]/bM)); env/=10;
  return Math.round((dur*.25+rms*.15+zcr*.25+cen*.15+env*.20)*100);
}

// ── useRecorder ──
function useRecorder(){
  const [recording,setRecording]=useState(false);
  const [secs,setSecs]=useState(0);
  const [blob,setBlob]=useState(null);
  const [audioUrl,setAudioUrl]=useState(null);
  const [audioBuffer,setAudioBuffer]=useState(null);
  const mr=useRef(null), chunks=useRef([]), timer=useRef(null);

  const start=useCallback(async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      chunks.current=[];
      const rec=new MediaRecorder(stream); mr.current=rec;
      rec.ondataavailable=e=>{if(e.data.size>0)chunks.current.push(e.data);};
      rec.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const b=new Blob(chunks.current,{type:'audio/webm'});
        setBlob(b);
        setAudioUrl(URL.createObjectURL(b));
        try{
          const ab=await b.arrayBuffer();
          const ctx=new(window.AudioContext||window.webkitAudioContext)();
          setAudioBuffer(await ctx.decodeAudioData(ab));
        }catch(e){console.warn(e);}
      };
      rec.start(100); setRecording(true); setSecs(0);
      timer.current=setInterval(()=>setSecs(s=>s+1),1000);
    }catch(e){ alert('Microphone access required. Please allow it in your browser settings.'); }
  },[]);

  const stop=useCallback(()=>{ clearInterval(timer.current); setRecording(false); if(mr.current&&mr.current.state!=='inactive') mr.current.stop(); },[]);
  const reset=useCallback(()=>{ stop(); setBlob(null); setAudioUrl(null); setAudioBuffer(null); setSecs(0); },[stop]);
  const toggle=useCallback(()=>{ recording?stop():start(); },[recording,start,stop]);
  return{recording,secs,blob,audioUrl,audioBuffer,toggle,reset};
}

  const handleSave=async()=>{
    if(!rec.blob||!rec.audioBuffer)return;
    setSaving(true);
    try{
      const filename=`farts/${Date.now()}.webm`;
      const audioUrl=await uploadAudio(rec.blob, filename);
      const now=new Date();
      const {data,error}=await sb.from('farts').insert({
        name: formatDate(now),
        duration: rec.audioBuffer.duration,
        audio_url: audioUrl,
      }).select().single();
      if(error)throw error;
      onSave({
        id:data.id, name:data.name, date:new Date(data.created_at),
        duration:data.duration, audioUrl:data.audio_url,
        audioBuffer:rec.audioBuffer, guessCount:0,

// ════════════ DETAIL SCREEN ════════════
function DetailScreen({sub,onBack,onGuessAdded,isOwner}){
  const [unlocked,setUnlocked]=useState(!!isOwner);
  const [playing,setPlaying]=useState(false);
  const [analysing,setAnalysing]=useState(false);
  const [myResult,setMyResult]=useState(null);
  const [guesses,setGuesses]=useState([]);
  const [shareOpen,setShareOpen]=useState(false);
  const [guestName,setGuestName]=useState('');
  const [nameSet,setNameSet]=useState(!!isOwner);
  const [loadingAudio,setLoadingAudio]=useState(!sub.audioBuffer);
  const [subAudioBuffer,setSubAudioBuffer]=useState(sub.audioBuffer||null);
  const audioRef=useRef(null);
  const rec=useRecorder();

  // Load audio buffer from URL if not already loaded
  useEffect(()=>{
    if(!subAudioBuffer&&sub.audioUrl){
      setLoadingAudio(true);
      urlToAudioBuffer(sub.audioUrl)
        .then(buf=>{setSubAudioBuffer(buf);setLoadingAudio(false);})
        .catch(()=>setLoadingAudio(false));
    }
    if(sub.audioUrl){
      audioRef.current=new Audio(sub.audioUrl);
      audioRef.current.onended=()=>setPlaying(false);
    }
    // Load guesses
    sb.from('guesses').select('*').eq('fart_id',sub.id).order('score',{ascending:false})
      .then(({data})=>{
        if(data) setGuesses(data.map(g=>({...g,name:g.guesser_name})));
      });
    return()=>{ if(audioRef.current) audioRef.current.pause(); rec.reset(); };
  },[sub.id]);

  const togglePlay=()=>{
    if(!audioRef.current)return;
    if(playing){audioRef.current.pause();audioRef.current.currentTime=0;setPlaying(false);}
    else{audioRef.current.currentTime=0;audioRef.current.play().catch(()=>{});setPlaying(true);}
  };

  const analyse=async()=>{
    if(!rec.blob||!rec.audioBuffer||!subAudioBuffer)return;
    setAnalysing(true);
    const score=compareAudio(subAudioBuffer,rec.audioBuffer);
    let text=`Match score: ${score}%.`;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:`Fart acoustics analyst. Match: ${score}%. 2 dry sentences. No exclamation marks, no emoji.`}]})});
      const d=await res.json(); text=d.content?.[0]?.text||text;
    }catch(e){}

    // Upload guess audio + save to DB
    try{
      const filename=`guesses/${Date.now()}.webm`;
      const guessAudioUrl=await uploadAudio(rec.blob, filename);
      const {data}=await sb.from('guesses').insert({
        fart_id:sub.id, guesser_name:guestName||'Guest',
        score, analysis:text, audio_url:guessAudioUrl,
      }).select().single();
      if(data){
        const ng={...data,name:data.guesser_name,audioUrl:data.audio_url};
        const updated=[...guesses,ng].sort((a,b)=>b.score-a.score);
        setGuesses(updated);
        onGuessAdded(sub.id,updated.length);
      }
    }catch(e){console.error('Failed to save guess',e);}

    setMyResult({score,analysis:text});
    setAnalysing(false);
    setUnlocked(true);
    rec.reset();
  };

  if(!sub)return null;

  // ── Name entry ──
  if(!nameSet){
    return(
      <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.white}}>
        <NavBar title={sub.name} onBack={()=>{rec.reset();onBack();}}/>
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 24px',gap:16}}>
          <div style={{fontSize:22,fontWeight:700,color:C.text,letterSpacing:'-0.02em',textAlign:'center'}}>What's your name?</div>
          <div style={{fontSize:14,color:C.text3,textAlign:'center',lineHeight:1.5}}>It'll appear on the leaderboard.</div>
          <input value={guestName} onChange={e=>setGuestName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&guestName.trim()&&setNameSet(true)}
            placeholder="Enter your name"
            style={{width:'100%',maxWidth:320,padding:'14px 16px',borderRadius:12,border:`1.5px solid ${C.purpleBorder}`,fontSize:16,fontFamily:"'Open Sans',sans-serif",outline:'none',textAlign:'center',background:C.purpleBg,color:C.text}}
          />
          <button onClick={()=>guestName.trim()&&setNameSet(true)} style={{width:'100%',maxWidth:320,padding:14,borderRadius:12,border:'none',background:`linear-gradient(135deg,${C.purple},${C.purpleLight})`,color:'white',fontFamily:"'Open Sans',sans-serif",fontSize:16,fontWeight:700,cursor:'pointer',boxShadow:`0 4px 16px rgba(123,94,167,0.3)`}}>
            Continue
          </button>
        </div>
      </div>
    );
  }

  // ── LOCKED ──
  if(!unlocked)return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.white}}>
      <NavBar title={sub.name} onBack={()=>{rec.reset();onBack();}}/>
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        <div style={{padding:'24px 20px',borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:12,color:C.text3,marginBottom:16,fontWeight:500}}>{formatDate(sub.date)} · {fmt(sub.duration)}</div>
          <div style={{position:'relative',marginBottom:16,borderRadius:10,overflow:'hidden'}}>
            {loadingAudio
              ?<div style={{height:64,background:C.purpleBg,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}><Spinner/></div>
              :<BigWave buffer={subAudioBuffer} height={64} color="rgba(123,94,167,0.15)"/>
            }
            <div style={{position:'absolute',inset:0,backdropFilter:'blur(6px)',background:'rgba(243,240,249,0.75)',display:'flex',alignItems:'center',justifyContent:'center',gap:10,borderRadius:10}}>
              <svg width="18" height="22" viewBox="0 0 18 22" fill="none"><rect x="1" y="9" width="16" height="12" rx="3" stroke={C.purple} strokeWidth="1.8"/><path d="M5 9V6a4 4 0 018 0v3" stroke={C.purple} strokeWidth="1.8" strokeLinecap="round"/></svg>
              <span style={{fontSize:13,fontWeight:600,color:C.purple}}>Guess first to unlock</span>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:14,opacity:.3,pointerEvents:'none'}}>
            <div style={{width:44,height:44,borderRadius:'50%',background:`linear-gradient(135deg,${C.purple},${C.purpleLight})`,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="14" height="16" viewBox="0 0 14 16" fill="none"><path d="M2 1.5L13 8L2 14.5V1.5Z" fill="white"/></svg>
            </div>
            <div style={{fontSize:14,color:C.text3}}>Locked until you guess</div>
          </div>
        </div>
        <div style={{padding:'24px 20px 40px'}}>
          <div style={{fontSize:22,fontWeight:700,color:C.text,letterSpacing:'-0.02em',marginBottom:4}}>Your Guess</div>
          <div style={{fontSize:14,color:C.text3,marginBottom:24,lineHeight:1.5}}>Record your fart. You'll hear the original after you submit.</div>
          <div style={{background:C.purpleBg,borderRadius:14,padding:'28px 24px',display:'flex',flexDirection:'column',alignItems:'center',gap:16,border:`1px solid ${C.purpleBorder}`}}>
            <div style={{fontSize:13,color:C.text3,textAlign:'center'}}>{rec.audioBuffer?'Tap to re-record.':'Record your fart below.'}</div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
              <RecordButton recording={rec.recording} onToggle={rec.toggle} size="small"/>
              <div style={{fontSize:12,color:C.text3}}>{rec.recording?`Recording · ${fmt(rec.secs)}`:rec.audioBuffer?'Tap to re-record':'Tap to record'}</div>
            </div>
            {rec.audioBuffer&&!rec.recording&&<div style={{width:'100%'}}><BigWave buffer={rec.audioBuffer} height={40} color={C.purpleLight}/></div>}
            {rec.audioBuffer&&!rec.recording&&(
              <button onClick={analyse} disabled={analysing} style={{width:'100%',padding:14,borderRadius:12,border:'none',background:analysing?`rgba(123,94,167,0.5)`:`linear-gradient(135deg,${C.purple},${C.purpleLight})`,color:'white',fontFamily:"'Open Sans',sans-serif",fontSize:15,fontWeight:700,cursor:analysing?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,boxShadow:analysing?'none':`0 4px 16px rgba(123,94,167,0.3)`}}>
                {analysing&&<Spinner white/>}{analysing?'Analysing…':'Submit & Reveal'}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );

  // ── UNLOCKED ──
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.white}}>
      <NavBar title={sub.name} onBack={()=>{if(audioRef.current)audioRef.current.pause();rec.reset();onBack();}}
        rightSlot={<button onClick={()=>setShareOpen(true)} style={{background:'none',border:'none',color:C.purple,cursor:'pointer',fontSize:14,fontWeight:600,fontFamily:"'Open Sans',sans-serif"}}>Share</button>}
      />
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {myResult&&(
          <div style={{background:`linear-gradient(135deg,${C.purple},${C.purpleLight})`,padding:'24px 20px'}}>
            <div style={{fontSize:12,fontWeight:600,color:'rgba(255,255,255,0.7)',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}>Your Score</div>
            <div style={{fontSize:56,fontWeight:700,color:'white',letterSpacing:'-0.03em',lineHeight:1}}>{myResult.score}<span style={{fontSize:24,fontWeight:500,opacity:.7}}>%</span></div>
            {myResult.analysis&&<div style={{fontSize:13,color:'rgba(255,255,255,0.85)',marginTop:10,lineHeight:1.6}}>{myResult.analysis}</div>}
          </div>
        )}
        <div style={{padding:'24px 20px',borderBottom:`1px solid ${C.border}`}}>
          {myResult&&<div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:14}}>Original — now revealed</div>}
          {!myResult&&<div style={{fontSize:12,color:C.text3,marginBottom:16,fontWeight:500}}>{formatDate(sub.date)} · {fmt(sub.duration)}</div>}
          {loadingAudio
            ?<div style={{height:64,background:C.purpleBg,borderRadius:10,marginBottom:16,display:'flex',alignItems:'center',justifyContent:'center'}}><Spinner/></div>
            :<div style={{marginBottom:16}}><BigWave buffer={subAudioBuffer} height={64}/></div>
          }
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <button onClick={togglePlay} style={{width:44,height:44,borderRadius:'50%',background:`linear-gradient(135deg,${C.purple},${C.purpleLight})`,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'white',boxShadow:`0 4px 14px rgba(123,94,167,0.3)`}}>
              {playing?<svg width="12" height="14" viewBox="0 0 12 14" fill="none"><rect x="1" y="1" width="3.5" height="12" rx="1" fill="white"/><rect x="7.5" y="1" width="3.5" height="12" rx="1" fill="white"/></svg>:<svg width="14" height="16" viewBox="0 0 14 16" fill="none"><path d="M2 1.5L13 8L2 14.5V1.5Z" fill="white"/></svg>}
            </button>
            <div style={{fontSize:14,color:C.text3}}>{playing?'Playing…':'Tap to play original'}</div>
          </div>
        </div>
        <div style={{padding:'24px 20px 40px'}}>
          <div style={{fontSize:22,fontWeight:700,color:C.text,letterSpacing:'-0.02em',marginBottom:4}}>Leaderboard</div>
          <div style={{fontSize:14,color:C.text3,marginBottom:20}}>{guesses.length} guess{guesses.length!==1?'es':''} so far.</div>
          {guesses.length>0&&(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {guesses.map((g,i)=>(
                <div key={g.id} style={{background:i===0?`linear-gradient(135deg,rgba(123,94,167,0.1),rgba(155,126,200,0.06))`:C.purpleBg,borderRadius:12,padding:'14px 16px',display:'flex',alignItems:'center',gap:10,border:i===0?`1.5px solid ${C.purpleBorder}`:`1px solid ${C.purpleBorder}`}}>
                  <div style={{fontSize:13,fontWeight:700,color:i===0?C.purple:C.text3,width:20,textAlign:'center',flexShrink:0}}>{i+1}</div>
                  {g.audio_url&&<button onClick={()=>{const a=new Audio(g.audio_url);a.play().catch(()=>{});}} style={{width:32,height:32,borderRadius:'50%',background:C.white,border:`1px solid ${C.purpleBorder}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
                    <svg width="9" height="11" viewBox="0 0 10 12" fill="none"><path d="M1 1L9 6L1 11V1Z" fill={C.purple}/></svg>
                  </button>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,color:C.text}}>{g.name||g.guesser_name}</div>
                    {g.analysis&&<div style={{fontSize:11,color:C.text3,marginTop:1,lineHeight:1.4}}>{g.analysis}</div>}
                  </div>
                  <div style={{fontSize:18,fontWeight:700,color:i===0?C.purple:C.text,flexShrink:0}}>{g.score}%</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
      {shareOpen&&<ShareModal sub={sub} onClose={()=>setShareOpen(false)}/>}
    </div>
  );
}

// ════════════ ROOT ════════════
function App(){
  const [screen,setScreen]=useState('list');
  const [submissions,setSubmissions]=useState([]);
  const [activeSub,setActiveSub]=useState(null);
  const [hist,setHist]=useState(['list']);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    const load=async()=>{
      setLoading(true);
      const {data,error}=await sb.from('farts').select('*').order('created_at',{ascending:false});
      if(error){console.error(error);setLoading(false);return;}

      // For each fart, get guess count
      const subs=await Promise.all((data||[]).map(async f=>{
        const {count}=await sb.from('guesses').select('*',{count:'exact',head:true}).eq('fart_id',f.id);
        return{
          id:f.id, name:f.name, date:new Date(f.created_at),
          duration:f.duration, audioUrl:f.audio_url,
          audioBuffer:null, // loaded on demand when opening detail
          guessCount:count||0,
        };
      }));
      setSubmissions(subs);

      // Deep link: ?fart=UUID opens that fart directly
      const params=new URLSearchParams(window.location.search);
      const fartId=params.get('fart');
      if(fartId){
        const target=subs.find(s=>s.id===fartId);
        if(target){setActiveSub(target);setHist(['list','detail']);setScreen('detail');}
      }
      setLoading(false);
    };
    load();
  },[]);

  const navTo=s=>{setHist(h=>[...h,s]);setScreen(s);};
  const pop=()=>setHist(h=>{const n=h.slice(0,-1);setScreen(n[n.length-1]);return n;});

  const slide=s=>({
    position:'absolute',inset:0,
    transform:screen===s?'translateX(0)':hist.indexOf(s)<hist.indexOf(screen)?'translateX(-28%)':'translateX(100%)',
    transition:'transform .34s cubic-bezier(.4,0,.2,1)',
    zIndex:screen===s?2:1,
  });

  // isOwner = you're on the list screen naturally (not via ?fart= invite link)
  const isOwner=!new URLSearchParams(window.location.search).get('fart');

  return(
    <div style={{height:'100vh',overflow:'hidden',fontFamily:"'Open Sans',sans-serif",position:'relative',background:C.bg}}>
      <div style={slide('list')}>
        <ListScreen submissions={submissions} loading={loading}
          onOpen={sub=>{setActiveSub(sub);navTo('detail');}}
          onSubmitNew={()=>navTo('record')}/>
      </div>
      <div style={slide('record')}>
        <RecordScreen onBack={pop} onSave={sub=>{setSubmissions(s=>[sub,...s]);pop();}}/>
      </div>
      <div style={slide('detail')}>
        {activeSub&&<DetailScreen
          sub={submissions.find(s=>s.id===activeSub.id)||activeSub}
          onBack={pop}
          isOwner={isOwner}
          onGuessAdded={(id,newCount)=>setSubmissions(p=>p.map(s=>s.id===id?{...s,guessCount:newCount}:s))}
        />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('shell')).render(<App/>);
</script>
</body>
</html>
